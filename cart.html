<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Review your Pages & Co. shopping bag before checkout."
    />
    <title>Your Bag | Pages & Co.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
  </head>

  <body>
    <header class="site-header" data-site-header></header>

    <main class="cart-page" id="main-content">
      <section class="cart-section" aria-labelledby="cart-title">
        <div class="container">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="./index.html">Home</a>
            <span>/</span>
            <span>Bag</span>
          </nav>

          <h1 class="cart-title" id="cart-title">Your bag</h1>

          <div class="cart-layout">
            <div class="cart-items" data-cart-items></div>

            <aside class="cart-summary" aria-labelledby="cart-summary-title">
              <h2 id="cart-summary-title">Order summary</h2>

              <div class="summary-row">
                <span data-summary-subtotal-label>Subtotal</span>
                <strong data-summary-subtotal>$0.00</strong>
              </div>

              <div class="summary-row">
                <span>Shipping</span>
                <strong>Free</strong>
              </div>

              <div class="summary-row" data-summary-discount-row hidden>
                <span data-summary-discount-label>Discount</span>
                <strong data-summary-discount>-$0.00</strong>
              </div>

              <div class="summary-total">
                <span>Total</span>
                <strong data-summary-total>$0.00</strong>
              </div>

              <button class="checkout-button" type="button">Checkout</button>

              <p class="checkout-note">
                You’ll be asked to sign in to complete your order.
              </p>
            </aside>
          </div>

          <div class="cart-empty" data-cart-empty hidden>
            <h2>Your bag is empty</h2>
            <p>
              Add a few books first, then come back here to review your order.
            </p>
            <a class="empty-cart-link" href="./books.html">Browse books</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="footer" data-site-footer></footer>

    <script type="module" src="./js/pages/cart.js"></script>
  </body>
</html>
